id: heartland.fhir.us.protocol
canonical: https://heartlandprotocol.org/fhir
name: HeartlandProtocolIG
title: HEARTLAND Protocol FHIR Implementation Guide
description: >-
  FHIR R4 Implementation Guide for the HEARTLAND Protocol v3.2 — a clinical
  implementation toolkit for primary care-led heart failure management in
  rural and resource-limited US settings. Defines profiles, extensions,
  questionnaires, and value sets enabling EHR vendors to exchange
  HEARTLAND-structured data (risk assessments, care plans, remote monitoring
  observations).
